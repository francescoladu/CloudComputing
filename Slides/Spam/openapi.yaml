openapi: 3.0.3
info:
  title: Swagger Employee - OpenAPI 3.0
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.11
servers:
  - url: http://10.1.1.230:8080/v2
paths:
  /employees:
    put:
      tags:
        - employee
      summary: Update an existing employee
      description: Update an existing employee by Id
      operationId: updateEmployee
      requestBody:
        description: Update an existent employee in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
          application/xml:
            schema:
              $ref: '#/components/schemas/Employee'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid ID supplied
        '404':
          description: Employee not found
        '422':
          description: Validation exception

    post:
      tags:
        - employee
      summary: Add a new employee 
      description: Add a new employee 
      operationId: addEmployee
      requestBody:
        description: Create a new employee in the store
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Employee'
          application/xml:
            schema:
              $ref: '#/components/schemas/Employee'
        required: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid input
        '422':
          description: Validation exception


  /employees/{employeeId}:
    get:
      tags:
        - employee
      summary: Find employee by ID
      description: Returns a single employee
      operationId: getEmployeeById
      parameters:
        - name: employeeId
          in: path
          description: ID of employee to return
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Employee'          
            application/xml:
              schema:
                $ref: '#/components/schemas/Employee'
        '400':
          description: Invalid ID supplied
        '404':
          description: Employee not found

    put:
      tags:
        - employee
      summary: Updates a employee in the store with form data
      description: ''
      operationId: updateEmployeeWithForm
      parameters:
        - name: employeeId
          in: path
          description: ID of employee that needs to be updated
          required: true
          schema:
            type: integer
            format: int64
        - name: name
          in: query
          description: Name of employee that needs to be updated
          schema:
            type: string
        - name: status
          in: query
          description: Status of employee that needs to be updated
          schema:
            type: string
      responses:
        '400':
          description: Invalid input

    delete:
      tags:
        - employee
      summary: Deletes an employee
      description: delete a employee
      operationId: employeeId
      parameters:
        - name: employeeId
          in: path
          description: Employee id to delete
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '400':
          description: Invalid employee value


components:
  schemas:
    Employee:
      required:
        - name
        - photoUrls
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
        name:
          type: string
          example: Carlo
        photoUrls:
          type: string
          example: "http://mywebsite.org/mypic.jpg"  
